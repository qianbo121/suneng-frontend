worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  types_hash_max_size 2048;
  client_max_body_size 20m;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/xml
    image/svg+xml;

  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream backend_upstream {
    server backend:3001;
  }

  upstream admin_upstream {
    server admin:80;
  }

  server {
    listen 80;
    server_name jssngyl.cn www.jssngyl.cn;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /product/showproduct.php {
      return 301 https://www.jssngyl.cn/zh/products;
    }

    location = /product/product.php {
      return 301 https://www.jssngyl.cn/zh/products;
    }

    location = /news/shownews.php {
      return 301 https://www.jssngyl.cn/zh/news;
    }

    location = /news/news.php {
      return 301 https://www.jssngyl.cn/zh/news;
    }

    location ~ \.php$ {
      return 301 https://www.jssngyl.cn/zh;
    }

    location / {
      return 301 https://www.jssngyl.cn$request_uri;
    }
  }

  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /product/showproduct.php {
      return 301 /zh/products;
    }

    location = /product/product.php {
      return 301 /zh/products;
    }

    location = /news/shownews.php {
      return 301 /zh/news;
    }

    location = /news/news.php {
      return 301 /zh/news;
    }

    location ~ \.php$ {
      return 301 /zh;
    }

    location /uploads/ {
      alias /var/www/uploads/;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      try_files $uri =404;
    }

    location /api/ {
      proxy_pass http://backend_upstream/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      proxy_pass http://admin_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
      proxy_pass http://frontend_upstream/_next/static/;
      proxy_http_version 1.1;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # SSL placeholder for Let's Encrypt certificates.
  # Replace example.com with your real domain before enabling.
  #
  # server {
  #   listen 443 ssl http2;
  #   server_name example.com www.example.com;
  #
  #   ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
  #
  #   include /etc/nginx/conf.d/site.conf;
  # }
}
